<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SahaBOSS — Personel Paneli</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sahaboss.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 0; }
        .top-bar { padding: 15px 20px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #38bdf8; position: sticky; top:0; z-index: 1000; }
        .main-content { padding: 20px; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #000; background: #38bdf8; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; font-family: inherit; }
        .btn-success { background: #10b981; color: #000; }
        input, textarea { width: 100%; padding: 10px; border-radius: 6px; background: #0f172a; border: 1px solid #334155; color: #fff; margin-top: 10px; font-family: inherit; }
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

    <header class="top-bar">
        <h1 style="font-size: 1rem; margin:0; color:#38bdf8;">SahaBOSS Takip</h1>
        <div id="worker-name" style="font-size: 0.8rem; color:#94a3b8;">Yükleniyor...</div>
    </header>

    <main class="main-content">
        <div class="card" style="background: linear-gradient(135deg, #0369a1, #0c4a6e); border:none;">
            <h3 style="margin:0;">Aktif Görevlerin</h3>
            <p style="font-size: 0.8rem; opacity: 0.8;">Sana atanan işleri buradan tamamla.</p>
        </div>

        <div id="worker-tasks-container">
            <p style="text-align:center; color:#94a3b8;">Görevler aranıyor...</p>
        </div>
    </main>

    <script type="module">
        import { auth, db, storage } from './firebase-app.js';
        import { collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-storage.js";
        import { protectPage } from './auth-guard-central.js';

        protectPage().then(({authorized, data}) => {
            if(!authorized) return;
            const worker = auth.currentUser;
            document.getElementById('worker-name').textContent = data.name || data.displayName || 'Personel';

            // GÖREVLERİ YÜKLE
            const q = query(collection(db, 'tasks'), where('assignedTo', '==', worker.uid));
            onSnapshot(q, (snapshot) => {
                let html = '';
                snapshot.forEach(docSnap => {
                    const t = docSnap.data();
                    const id = docSnap.id;
                    
                    if (t.status === 'done') return; // Tamamlananları gösterme

                    const isSubmitted = t.status === 'submitted';
                    const statusText = isSubmitted ? 'ONAY BEKLİYOR' : 'HAZIR / BEKLEMEDE';
                    const statusColor = isSubmitted ? '#38bdf8' : '#f59e0b';

                    html += `
                        <div class="card" style="border-left: 4px solid ${statusColor}">
                            <div class="status-badge" style="background:${statusColor}; color:#000;">${statusText}</div>
                            <h4 style="margin:0;">${t.title}</h4>
                            <p style="font-size: 0.8rem; color:#94a3b8; margin:8px 0;">${t.description}</p>
                            
                            ${!isSubmitted ? `
                                <div style="margin-top:15px; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px;">
                                    <label style="font-size:0.7rem; color:#38bdf8; font-weight:bold;">İŞ NOTU EKLE</label>
                                    <textarea id="note-${id}" placeholder="İşle ilgili notunu yaz..."></textarea>
                                    
                                    <label style="font-size:0.7rem; color:#38bdf8; font-weight:bold; display:block; margin-top:10px;">FOTOĞRAF YÜKLE (Opsiyonel)</label>
                                    <input type="file" id="file-${id}" accept="image/*" style="font-size:10px;">
                                    
                                    <button onclick="window.submitForApproval('${id}')" id="btn-${id}" class="btn-success btn" style="margin-top:15px;">
                                        <i class='bx bx-send'></i> BOSS ONAYINA GÖNDER
                                    </button>
                                </div>
                            ` : `<p style="font-size:0.75rem; color:#10b981; font-weight:bold; margin-top:10px;">🕒 Görev BOSS onayına gönderildi. Bekleyiniz.</p>`}
                        </div>
                    `;
                });
                document.getElementById('worker-tasks-container').innerHTML = html || '<p style="text-align:center; color:#94a3b8;">Şu an atanmış yeni görevin yok.</p>';
            });

            // ONAYA GÖNDERME FONKSİYONU
            window.submitForApproval = async (taskId) => {
                const note = document.getElementById(`note-${taskId}`).value;
                const fileInput = document.getElementById(`file-${taskId}`);
                const btn = document.getElementById(`btn-${taskId}`);
                
                if(!note) return alert("Lütfen iş ile ilgili kısa bir not girin!");
                
                btn.disabled = true;
                btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Gönderiliyor...";

                try {
                    let photoURL = "";
                    if(fileInput.files[0]) {
                        const file = fileInput.files[0];
                        const storageRef = ref(storage, `task_photos/${taskId}_${Date.now()}`);
                        const snapshot = await uploadBytes(storageRef, file);
                        photoURL = await getDownloadURL(snapshot.ref);
                    }

                    await updateDoc(doc(db, 'tasks', taskId), {
                        status: 'submitted',
                        workerNote: note,
                        photoURL: photoURL,
                        submittedAt: new Date()
                    });

                    alert("✅ İş başarıyla merkeze gönderildi. BOSS onayı bekleniyor.");
                } catch(e) {
                    alert("Hata: " + e.message);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = "BOSS ONAYINA GÖNDER";
                }
            };
        });
    </script>
</body>
</html>
