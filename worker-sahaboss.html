<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e293b">
    <title>SahaBOSS — İşçi Portalı</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sahaboss.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 0; }
        .app-container { min-height: 100vh; display: flex; flex-direction: column; }
        .top-bar { padding: 15px 20px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .main-content { flex: 1; padding: 20px; padding-bottom: 80px; overflow-y: auto; }
        .tab-bar { position: fixed; bottom: 0; left:0; right:0; background: #1e293b; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .tab-item { text-align: center; color: #94a3b8; font-size: 0.7rem; cursor: pointer; flex:1; }
        .tab-item.active { color: #f59e0b; }
        .tab-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; display: block; width: 100%; text-align: center; text-decoration: none; }
        .btn-primary { background: #f59e0b; color: #000; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-ghost { background: rgba(255,255,255,0.1); color: #fff; }
        .hidden { display: none !important; }
        .page { display: none; }
        .page.active { display: block; }
        #task-detail-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 1000; display: flex; flex-direction: column; overflow-y: auto; }
        #loader { position: fixed; inset: 0; background: #0f172a; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .spin { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #f59e0b; border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="spin"></div></div>

    <div class="app-container">
        <header class="top-bar">
            <h1 style="font-size: 1.2rem; margin: 0;">SahaBOSS</h1>
            <button class="btn btn-ghost" style="padding: 5px 10px; font-size: 0.7rem; width: auto;" onclick="window.location.href='dashboard.html'"><i class='bx bx-log-out'></i> Dashboard</button>
        </header>

        <main class="main-content">
            <section id="page-dashboard" class="page active">
                <div class="card"><h3>Hoş Geldin!</h3><p style="color:#94a3b8; font-size:0.8rem;">Saha görevlerine ve diğer programlara buradan erişebilirsin.</p></div>
                
                <!-- OTOMATİK TAKİP BİLGİ KARTI -->
                <div class="card" style="border-left: 4px solid #10b981;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div style="font-weight: 800; font-size: 0.85rem; color: #10b981;">GÜVENLİ TAKİP AKTİF</div>
                            <p style="font-size: 0.7rem; color: #94a3b8; margin-top: 4px;">Konumunuz 10 dk aralıklarla yöneticiyle paylaşılır.</p>
                        </div>
                        <i class='bx bxs-check-shield' style="font-size: 24px; color: #10b981;"></i>
                    </div>
                </div>

                <div class="card"><button class="btn btn-primary" onclick="window.location.href='dashboard.html'"><i class='bx bx-home'></i> Ana Dashboard'a Dön</button></div>
            </section>
            
            <section id="page-tasks" class="page"><h3>Görevlerim</h3><div id="tasks-container"><p class="text-center">Yükleniyor...</p></div></section>
            <section id="page-map" class="page"><h3>İş Haritası</h3><div class="card">Haritaya ihtiyaç duyduğunda konuma tıkla.</div></section>
            
            <section id="page-profile" class="page">
                <div class="card text-center"><h3 id="p-name">...</h3><p style="color:#94a3b8; font-size:0.8rem;">Saha Ekibi</p></div>
                <button class="btn btn-danger" onclick="location.href='login.html'">Güvenli Çıkış</button>
            </section>
        </main>

        <nav class="tab-bar">
            <div class="tab-item active" onclick="showPage('dashboard', this)"><i class='bx bxs-dashboard'></i><span>Özet</span></div>
            <div class="tab-item" onclick="showPage('tasks', this)"><i class='bx bx-list-ul'></i><span>Görevin</span></div>
            <div class="tab-item" onclick="showPage('map', this)"><i class='bx bx-map-alt'></i><span>Harita</span></div>
            <div class="tab-item" onclick="showPage('profile', this)"><i class='bx bx-user-circle'></i><span>Profil</span></div>
        </nav>
    </div>

    <!-- GÖREV DETAY PENCERESİ -->
    <div id="task-detail-overlay" class="hidden">
        <div class="top-bar">
            <button class="btn-ghost" style="width: auto;" onclick="document.getElementById('task-detail-overlay').classList.add('hidden')"><i class='bx bx-chevron-left'></i> Geri</button>
            <h3>Saha Raporu</h3>
            <div style="width: 40px;"></div>
        </div>
        <div id="task-detail-content" style="padding: 20px;"></div>
    </div>

    <script>
        setTimeout(function() { var l = document.getElementById('loader'); if (l) l.style.display = 'none'; }, 5000);
        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
            document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            if (pageId === 'map' && window.map) window.map.invalidateSize();
        }
    </script>

    <script type="module">
        import { auth, db } from './firebase-app.js';
        import { protectPage } from './auth-guard-central.js';
        import { initTasks } from './tasks.js?v=111';
        import { initLocation } from './location.js?v=111';

        protectPage().then(async ({ authorized, data }) => {
            document.getElementById('loader').style.display = 'none';
            if (!authorized) return;
            window.user = auth.currentUser;
            window.userData = data;
            document.getElementById('p-name').textContent = data.name || 'Personel';
            
            initTasks();
            initLocation(); // TAKİP SİSTEMİNİ BAŞLAT
        });
    </script>
</body>
</html>
