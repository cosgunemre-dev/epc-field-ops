<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e293b">
    <title>SahaBOSS — İşçi Portalı</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sahaboss.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 0; }
        .app-container { min-height: 100vh; display: flex; flex-direction: column; }
        .top-bar { padding: 15px 20px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .tab-bar { position: sticky; bottom: 0; background: #1e293b; display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); }
        .tab-item { text-align: center; color: #94a3b8; font-size: 0.7rem; cursor: pointer; }
        .tab-item.active { color: #f59e0b; }
        .tab-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; display: block; width: 100%; text-align: center; text-decoration: none; }
        .btn-primary { background: #f59e0b; color: #000; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-ghost { background: rgba(255,255,255,0.1); color: #fff; }
        .hidden { display: none !important; }
        .page { display: none; }
        .page.active { display: block; }

        #loader { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .spin { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #f59e0b; border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- YÜKLEME EKRANI -->
    <div id="loader"><div class="spin"></div></div>

    <!-- SÜPER BALYOZ: Bu kod her türlü çalışır, modül hatası dinlemez -->
    <script>
        console.log("Süper Balyoz Sayacı Başladı...");
        setTimeout(function() {
            var l = document.getElementById('loader');
            if (l && l.style.display !== 'none') {
                console.warn("Otomatik Kapatma Devreye Girdi!");
                l.style.display = 'none';
            }
        }, 5000); // 5 saniye sonra ne olursa olsun kapat
    </script>

    <div class="app-container">
        <header class="top-bar">
            <h1 style="font-size: 1.2rem; margin: 0;">SahaBOSS</h1>
            <div id="display-name" style="font-size: 0.8rem; color: #94a3b8;">...</div>
        </header>

        <main class="main-content">
            <section id="page-dashboard" class="page active">
                <div class="card">
                    <h3>Hoş Geldin!</h3>
                    <p style="color: #94a3b8; font-size: 0.8rem;">Saha görevlerine buradan erişebilirsin.</p>
                </div>
            </section>

            <section id="page-tasks" class="page">
                <h3>Görevlerim</h3>
                <div id="tasks-container">
                    <p style="text-align: center; color: #94a3b8; padding: 20px;">Sorgulanıyor...</p>
                </div>
            </section>

            <section id="page-map" class="page">
                <h3>Saha Haritası</h3>
                <div id="map-container" style="height: 300px; background: rgba(0,0,0,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #333;">
                    Harita Modulü
                </div>
            </section>

            <section id="page-profile" class="page">
                <div class="card text-center">
                    <h3 id="p-name">...</h3>
                    <p style="color: #94a3b8; font-size: 0.8rem;">Saha Personeli</p>
                </div>
                <!-- PREMİUM İÇİN GERİ DÖNÜŞ BUTONU -->
                <div id="premium-back-section" class="hidden">
                    <button class="btn btn-primary" style="margin-bottom: 20px;" onclick="window.location.href='dashboard.html'"><i class='bx bx-home'></i> Dashboard'a Geri Dön</button>
                    <p style="font-size: 0.7rem; color: #94a3b8; margin: -10px 0 20px;">Premium üye olduğunuz için her yere erişebilirsiniz.</p>
                </div>
                <button class="btn btn-ghost" onclick="window.location.reload()">Sayfayı Yenile</button>
                <button class="btn btn-danger" style="margin-top: 10px;" id="btn-logout">Oturumu Kapat</button>
            </section>
        </main>

        <nav class="tab-bar">
            <div class="tab-item active" data-nav="dashboard"><i class='bx bxs-dashboard'></i><span>Özet</span></div>
            <div class="tab-item" data-nav="tasks"><i class='bx bx-list-ul'></i><span>İşlerim</span></div>
            <div class="tab-item" data-nav="map"><i class='bx bx-map-alt'></i><span>Harita</span></div>
            <div class="tab-item" data-nav="profile"><i class='bx bx-user-circle'></i><span>Profil</span></div>
        </nav>
    </div>

    <script type="module">
        import { auth, signOut } from './firebase-app.js';
        import { protectPage } from './auth-guard-central.js';
        import { initTasks } from './tasks.js?v=999';

        protectPage().then(async ({ authorized, data }) => {
            document.getElementById('loader').style.display = 'none';
            if (!authorized) return;

            window.user = auth.currentUser;
            window.userData = data;

            document.getElementById('display-name').textContent = data.displayName || data.name || 'Personel';
            document.getElementById('p-name').textContent = data.displayName || data.name || 'Personel';

            if (data.isPremium) {
                document.getElementById('premium-back-section').classList.remove('hidden');
            }

            initNavigation();
            initTasks();
        }).catch(err => {
            console.error("Giriş Hatası:", err);
            document.getElementById('loader').style.display = 'none';
        });

        function initNavigation() {
            const tabs = document.querySelectorAll('.tab-item');
            const pages = document.querySelectorAll('.page');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.dataset.nav;
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    pages.forEach(p => p.classList.remove('active'));
                    document.getElementById('page-' + target).classList.add('active');
                });
            });
        }

        document.getElementById('btn-logout').onclick = () => {
            signOut(auth).then(() => window.location.href = 'login.html');
        };
    </script>
</body>
</html>
