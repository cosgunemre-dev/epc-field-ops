<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SahaBOSS — Yönetim Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root { --bg: #0f172a; --surface: #1e293b; --accent: #f59e0b; --text: #f1f5f9; --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 40px; min-height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        h2 { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-size: 1.2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } body { padding: 20px; } }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; color: #fff; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .btn { padding: 12px 24px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
        .btn-primary { background: var(--accent); color: #000; width: 100%; justify-content: center; }
        .btn-ghost { background: var(--border); color: #fff; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: var(--text-dim); font-size: 0.8rem; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 15px 10px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }
        
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .loader-spin { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-spin"></div></div>

    <header>
        <div>
            <a href="dashboard.html" style="color: var(--text-dim); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; margin-bottom: 10px;"><i class='bx bx-arrow-back'></i> Geri Dön</a>
            <h1>SahaBOSS — Ekip Yönetimi</h1>
        </div>
        <div id="user-email-text" style="font-size: 0.85rem; color: var(--text-dim);">...</div>
    </header>

    <div class="grid">
        <!-- PERSONEL EKLEME (E-POSTA İLE BAĞLAMA) -->
        <div class="card">
            <h2><i class='bx bx-user-plus'></i> Ekipe Personel Ekle</h2>
            <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px;">Personelin önce sisteme üye olması ve e-postasını onaylaması gerekir.</p>
            <form id="form-link-staff">
                <div class="form-group">
                    <label>Personel E-posta Adresi</label>
                    <input type="email" id="st-email" required placeholder="ornek@saha.com">
                </div>
                <div class="form-group">
                    <label>Saha Rolü / Ünvanı</label>
                    <select id="st-role">
                        <option value="mudur">Proje Müdürü</option>
                        <option value="sef">Şef / Mühendis</option>
                        <option value="forman">Formen</option>
                        <option value="isci" selected>İşçi</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" id="btn-link-submit"><i class='bx bx-link-alt'></i> Ekibe Bağla ve Yetkilendir</button>
            </form>
        </div>

        <!-- EKİP LİSTESİ -->
        <div class="card">
            <h2><i class='bx bx-group'></i> Mevcut Saha Ekibiniz</h2>
            <div id="staff-list-container" style="max-height: 400px; overflow-y: auto;">
                <table>
                    <thead><tr><th>PERSONEL</th><th>ROL</th><th>İŞLEM</th></tr></thead>
                    <tbody id="staff-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- PROJE LİSTESİ -->
    <div class="card">
        <h2><i class='bx bx-layer'></i> Sahadaki Projeler</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="new-project-name" placeholder="Yeni Proje Adı (Örn: X GES Projesi Sahası)" style="flex: 1;">
            <button class="btn btn-primary" id="btn-add-project" style="width: auto;"><i class='bx bx-plus'></i> Ekle</button>
        </div>
        <div id="project-list" style="display: flex; flex-wrap: wrap; gap: 10px;"></div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-app.js';
        import { protectPage } from './auth-guard-central.js';
        import { 
            collection, query, where, getDocs, updateDoc, doc, onSnapshot, serverTimestamp, deleteDoc, addDoc 
        } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        
        setTimeout(() => { if (document.getElementById('loader')) document.getElementById('loader').style.display = 'none'; }, 5000);

        protectPage().then(async ({ authorized, data }) => {
            document.getElementById('loader').style.display = 'none';
            if (!authorized) return;
            document.getElementById('user-email-text').innerText = auth.currentUser.email;
            loadStaff(auth.currentUser.uid);
            loadProjects(auth.currentUser.uid);
        });

        // EKİBE BAĞLAMA MANTIĞI
        document.getElementById('form-link-staff').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-link-submit');
            const email = document.getElementById('st-email').value.trim();
            const role = document.getElementById('st-role').value;

            btn.disabled = true;
            btn.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Aranıyor...";

            try {
                // 1. Kullanıcıyı e-posta ile bul
                const q = query(collection(db, 'users'), where('email', '==', email));
                const snap = await getDocs(q);

                if (snap.empty) {
                    alert('HATA: Bu e-posta ile kayıtlı bir kullanıcı bulunamadı. Lütfen personelin önce kayıt olduğundan emin olun.');
                } else {
                    const userDoc = snap.docs[0];
                    // 2. Kullanıcıyı ekip üyesi olarak güncelle
                    await updateDoc(doc(db, 'users', userDoc.id), {
                        managedBy: auth.currentUser.uid,
                        role: role,
                        isFieldStaff: true,
                        // Not: Proje ID şimdilik şefin mevcut projesi olabilir
                        projectId: window.adminData?.projectId || 'default_project'
                    });
                    alert(`${email} başarıyla ekibinize eklendi!`);
                    document.getElementById('st-email').value = '';
                }
            } catch (err) {
                alert('Bağlama hatası: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "<i class='bx bx-link-alt'></i> Ekibe Bağla ve Yetkilendir";
            }
        };

        function loadStaff(uid) {
            const q = query(collection(db, 'users'), where('managedBy', '==', uid));
            onSnapshot(q, (snapshot) => {
                const tbody = document.getElementById('staff-table-body');
                tbody.innerHTML = '';
                snapshot.forEach(d => {
                    const u = d.data();
                    tbody.innerHTML += `<tr>
                        <td><strong>${u.name || u.displayName}</strong><br><small>${u.email}</small></td>
                        <td><span class="badge" style="background:var(--border)">${(u.role || 'isci').toUpperCase()}</span></td>
                        <td><button class="btn btn-ghost" style="padding:5px 10px; font-size:10px;" onclick="window.unlinkUser('${d.id}')">Kaldır</button></td>
                    </tr>`;
                });
            });
        }

        window.unlinkUser = async (id) => {
            if(confirm('Personeli ekibinizden çıkarmak istiyor musunuz?')) {
                await updateDoc(doc(db, 'users', id), { managedBy: null, isFieldStaff: false });
            }
        };

        function loadProjects(uid) {
             const q = query(collection(db, 'projects'), where('ownerId', '==', uid));
             onSnapshot(q, (snapshot) => {
                 const container = document.getElementById('project-list');
                 container.innerHTML = '';
                 snapshot.forEach(doc => {
                     container.innerHTML += `<span class="badge" style="background:var(--accent); color:#000; padding:10px 15px; font-size:0.9rem;">${doc.data().name}</span>`;
                 });
             });
        }

        document.getElementById('btn-add-project').onclick = async () => {
            const name = document.getElementById('new-project-name').value.trim();
            if(!name) return;
            await addDoc(collection(db, 'projects'), { name, ownerId: auth.currentUser.uid, createdAt: serverTimestamp() });
            document.getElementById('new-project-name').value = '';
        };
    </script>
</body>
</html>
