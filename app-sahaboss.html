<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SahaBOSS — Komuta Merkezi</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sahaboss.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 0; }
        .top-bar { padding: 12px 20px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top:0; z-index: 1100; }
        .tab-bar { background: #111827; display: flex; justify-content: space-around; padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top:52px; z-index: 1050; }
        .nav-item { text-align: center; color: #94a3b8; font-size: 0.75rem; cursor: pointer; flex:1; padding: 12px; background: none; border:none; transition: 0.3s; font-family: inherit; }
        .nav-item.active { color: #f59e0b; border-bottom: 2px solid #f59e0b; background: rgba(245,158,11,0.05); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 3px; }
        .main-content { padding: 20px; min-height: calc(100vh - 130px); }
        .page { display: none; max-width: 1200px; margin: 0 auto; }
        .page.active { display: block; }
        .card { background: #1e293b; border-radius: 14px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; color: #000; background: #f59e0b; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; background: #0f172a; border: 1px solid #334155; color: #fff; margin-bottom: 15px; font-family: inherit; }
        label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .hidden { display: none !important; }
        #loader { position: fixed; inset: 0; background: #0f172a; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .spin { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #f59e0b; border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="spin"></div></div>

    <div class="app-container">
        <header class="top-bar">
            <h1 style="font-size: 1.2rem; margin: 0; font-weight: 800; color: #f59e0b;">SahaBOSS</h1>
            <div id="display-name" style="font-size: 0.8rem; color: #94a3b8;">Yönetici</div>
        </header>

        <nav class="tab-bar">
            <button class="nav-item active" onclick="showPage('dashboard', this)" data-nav="dashboard"><i class='bx bxs-dashboard'></i> Özet</button>
            <button class="nav-item" onclick="showPage('tasks', this)" data-nav="tasks"><i class='bx bx-list-ul'></i>İş Havuzu</button>
            <button class="nav-item" onclick="showPage('map', this)" data-nav="map"><i class='bx bx-map-pin'></i>Harita</button>
            <button class="nav-item" id="btn-open-reports"><i class='bx bxs-file-pdf'></i>Raporlar</button>
            <button class="nav-item" onclick="showPage('profile', this)" data-nav="profile"><i class='bx bxs-user-detail'></i>Ekip / Profil</button>
        </nav>

        <main class="main-content">
            <!-- ÖZET -->
            <section id="page-dashboard" class="page active">
                <div class="card" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
                    <h2 style="margin:0;">Hoş Geldin, <span id="welcome-name">Yöneticim</span></h2>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                    <button class="btn" style="height: 60px;" onclick="window.openNewTaskModal()"><i class='bx bx-plus-circle'></i> YENİ İŞ ATA</button>
                    <button class="btn" style="height: 60px; background: #10b981;" onclick="document.getElementById('modal-new-staff').classList.remove('hidden')"><i class='bx bx-user-plus'></i> PERSONEL EKLE</button>
                </div>
                <div id="tasks-summary-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="card" style="text-align:center;"><div id="count-pending" style="font-size:1.5rem; font-weight:800; color:#f59e0b;">0</div><div style="font-size:0.7rem;">BEKLEYEN</div></div>
                    <div class="card" style="text-align:center;"><div id="count-done" style="font-size:1.5rem; font-weight:800; color:#10b981;">0</div><div style="font-size:0.7rem;">TAMAMLANAN</div></div>
                </div>
            </section>

            <!-- İŞLER -->
            <section id="page-tasks" class="page">
                <h3>Saha Görevleri</h3>
                <div id="tasks-container"></div>
            </section>

            <!-- HARİTA -->
            <section id="page-map" class="page">
                <div style="display: flex; height: 550px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);">
                    <div style="width: 260px; background: #111827; padding: 15px; overflow-y: auto;">
                        <h4 style="color:#f59e0b;">Harita Katmanları</h4>
                        <input type="file" id="input-layer-file" accept=".kml,.kmz" style="font-size: 11px;">
                        <button class="btn" style="width:100%; font-size: 11px;" onclick="handleLayerUpload()">Yükle</button>
                        <div id="layer-list" style="margin-top:20px;"></div>
                    </div>
                    <div id="map-container" style="flex:1;"></div>
                </div>
            </section>

            <!-- EKİP / PROFİL -->
            <section id="page-profile" class="page">
                <div class="card">
                    <h3>Ekip Listesi</h3>
                    <div id="team-list"></div>
                    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0;">
                    <button class="btn" style="background:#ef4444; color:#fff; width:100%;" onclick="window.location.href='login.html'">ÇIKIŞ YAP</button>
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL: PERSONEL EKLE -->
    <div id="modal-new-staff" class="modal-overlay hidden">
        <div class="card" style="width: 100%; max-width: 400px;">
            <h3>Yeni Personel Ekle</h3>
            <label>AD SOYAD</label>
            <input type="text" id="staff-name" placeholder="Örn: Ahmet Yılmaz">
            <label>E-POSTA</label>
            <input type="email" id="staff-email" placeholder="ahmet@firmadi.com">
            <p style="font-size: 0.7rem; color: #94a3b8;">* Şifre varsayılan olarak 'saha1234' atanacaktır.</p>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn" id="btn-save-staff" style="flex:2;">KAYDET</button>
                <button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('modal-new-staff').classList.add('hidden')">İPTAL</button>
            </div>
        </div>
    </div>

    <!-- MODAL: YENİ İŞ ATA -->
    <div id="modal-new-task" class="modal-overlay hidden">
        <div class="card" style="width: 100%; max-width: 500px;">
            <h3>Yeni İş Ataması</h3>
            <label>İŞ BAŞLIĞI</label>
            <input type="text" id="task-title" placeholder="İşin adı">
            <label>PERSONEL SEÇ</label>
            <select id="task-assignee"><option value="">Yükleniyor...</option></select>
            <label>DETAYLI AÇIKLAMA</label>
            <textarea id="task-desc" rows="4"></textarea>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn" id="btn-save-task" style="flex:2;">GÖNDER</button>
                <button class="btn btn-ghost" onclick="document.getElementById('modal-new-task').classList.add('hidden')">İPTAL</button>
            </div>
        </div>
    </div>

    <script>
        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            if (pageId === 'map' && window.map) setTimeout(() => window.map.invalidateSize(), 300);
        }
    </script>
    <script type="module">
        import { auth, db } from './firebase-app.js';
        import { protectPage } from './auth-guard-central.js';
        import { initTasks } from './tasks.js?v=300';
        import { initMap } from './maps.js?v=300';
        import { initReports } from './reports.js';
        import { initLayers } from './layers.js?v=300';
        import { collection, query, where, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        protectPage().then(({ authorized, data }) => {
            document.getElementById('loader').style.display = 'none';
            if (!authorized) return;
            window.user = auth.currentUser;
            window.userData = data;

            document.getElementById('display-name').textContent = data.name || 'Yönetici';
            document.getElementById('welcome-name').textContent = data.name || 'Yöneticim';

            // EKİP LİSTESİ DİNAMİK GÜNCELLEME
            const teamList = document.getElementById('team-list');
            const assigneeSelect = document.getElementById('task-assignee');
            const q = query(collection(db, 'users'), where('managedBy', '==', window.user.uid));
            onSnapshot(q, (snapshot) => {
                let html = '';
                assigneeSelect.innerHTML = '<option value="">Personel Seçiniz...</option>';
                snapshot.forEach(doc => {
                    const s = doc.data();
                    const name = s.name || s.displayName || s.email || 'İsimsiz Personel';
                    html += `<div class="card" style="padding:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03);">
                        <div><div style="font-weight:bold;">${name}</div><div style="font-size:0.7rem; color:#94a3b8;">${s.email}</div></div>
                        <div style="color:#10b981; font-size:10px; font-weight:bold;">AKTİF</div>
                    </div>`;
                    assigneeSelect.innerHTML += `<option value="${doc.id}">${name}</option>`;
                });
                teamList.innerHTML = html || '<p style="color:#94a3b8;">Ekipte henüz kimse yok.</p>';
            });

            // PERSONEL KAYDETME (Simülasyon - Admin panel şifresi ile eşleşmeli)
            document.getElementById('btn-save-staff').onclick = async () => {
                const name = document.getElementById('staff-name').value;
                const email = document.getElementById('staff-email').value;
                if (!name || !email) return alert("Lütfen tüm alanları doldurun.");
                
                try {
                    await addDoc(collection(db, 'users'), {
                        name: name,
                        email: email,
                        managedBy: window.user.uid,
                        role: 'worker',
                        createdAt: serverTimestamp()
                    });
                    document.getElementById('modal-new-staff').classList.add('hidden');
                    alert("✅ Personel başarıyla listeye eklendi. (Giriş yapabilmesi için Admin panelden şifreli hesabı oluşturulmalıdır)");
                } catch (e) { alert("Hata: " + e.message); }
            };

            initTasks(); initMap(); initReports(); initLayers();
        });
    </script>
</body>
</html>
