<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SahaBOSS — Yönetici Paneli</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sahaboss.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 0; }
        .top-bar { padding: 10px 20px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top:0; z-index: 1100; }
        .tab-bar { background: #111827; display: flex; justify-content: space-around; padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top:52px; z-index: 1050; }
        .nav-item { text-align: center; color: #94a3b8; font-size: 0.7rem; cursor: pointer; flex:1; padding: 10px; background: none; border:none; transition: 0.3s; }
        .nav-item.active { color: #f59e0b; border-bottom: 2px solid #f59e0b; background: rgba(245,158,11,0.05); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .main-content { padding: 20px; min-height: calc(100vh - 120px); }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: #000; background: #f59e0b; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
        .btn-ghost { background: rgba(255,255,255,0.05); color: #fff; padding: 8px 15px; }
        .map-wrapper { display: flex; height: 500px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); background: #1e293b; }
        #map-sidebar { width: 250px; padding: 15px; overflow-y: auto; background: #111827; border-right: 1px solid rgba(255,255,255,0.1); }
        #map-container { flex: 1; height: 100%; z-index: 1; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #loader { position: fixed; inset: 0; background: #0f172a; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .spin { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #f59e0b; border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/@mapbox/togeojson@0.16.0/togeojson.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div id="loader"><div class="spin"></div></div>

    <div class="app-container">
        <header class="top-bar">
            <h1 style="font-size: 1.1rem; margin: 0; font-weight: 800; color: #f59e0b;">SahaBOSS</h1>
            <div id="display-name" style="font-size: 0.75rem; color: #94a3b8;">Yönetici</div>
        </header>

        <nav class="tab-bar">
            <button class="nav-item active" onclick="showPage('dashboard', this)" data-nav="dashboard"><i class='bx bxs-grid-alt'></i> Özet</button>
            <button class="nav-item" onclick="showPage('tasks', this)" data-nav="tasks"><i class='bx bx-task'></i> İşler</button>
            <button class="nav-item" onclick="showPage('map', this)" data-nav="map"><i class='bx bx-map-alt'></i> Harita</button>
            <button class="nav-item" id="btn-open-reports"><i class='bx bxs-file-pdf'></i> Raporlar</button>
            <button class="nav-item" onclick="showPage('profile', this)" data-nav="profile"><i class='bx bx-user-circle'></i> Profil</button>
        </nav>

        <main class="main-content">
            <!-- ÖZET -->
            <section id="page-dashboard" class="page active">
                <div class="card" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
                    <h3 style="margin:0;">Hoş Geldin, Yöneticim</h3>
                    <p style="color: #94a3b8; font-size: 0.8rem;">İşlerini buradan yönetebilirsin.</p>
                </div>
                <!-- HIZLI EYLEMLER -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <button class="btn" onclick="window.openNewTaskModal()"><i class='bx bx-plus-circle'></i> Yeni İş Ata</button>
                    <!-- EKİP EKLEME BUTONU GERİ GELDİ -->
                    <button class="btn" style="background: #10b981;" onclick="showPage('profile', document.querySelector('[data-nav=profile]'))"><i class='bx bx-group'></i> Ekibi Yönet</button>
                </div>
                <h3>Sondurumu İzle</h3>
                <div id="tasks-summary-container"></div>
            </section>

            <!-- İŞLER -->
            <section id="page-tasks" class="page">
                <h3>Saha Görevleri</h3>
                <div id="tasks-container"></div>
            </section>

            <!-- HARİTA -->
            <section id="page-map" class="page">
                <div class="map-wrapper">
                    <div id="map-sidebar">
                        <h4 style="margin-top:0; color:#f59e0b;">🏘️ Saha Sınırları</h4>
                        <div class="card" style="padding: 10px; background: rgba(255,255,255,0.02); margin-bottom: 10px;">
                            <input type="file" id="input-layer-file" accept=".kml,.kmz" style="font-size: 10px; width: 100%;">
                            <button class="btn" style="width:100%; padding: 6px; font-size: 11px; margin-top:10px;" onclick="handleLayerUpload()">Projeyi Ekle</button>
                        </div>
                        <div id="layer-list"></div>
                    </div>
                    <div id="map-container"></div>
                </div>
            </section>

            <!-- PROFİL (Burası Ekip Yönetimi İçin) -->
            <section id="page-profile" class="page">
                <div class="card">
                    <h3>Ekip ve Hesap Bilgileri</h3>
                    <div id="p-name" style="font-weight:bold; margin-bottom:20px;">-</div>
                    <button class="btn btn-ghost" style="width:100%; margin-bottom:10px;" onclick="alert('Kayıtlı personeller tasks.js üzerinden yönetiliyor.')"><i class='bx bx-group'></i> Ekibi Görüntüle</button>
                    <button class="btn" style="background:#ef4444; color:#fff; width:100%;" onclick="window.location.href='login.html'">Çıkış Yap</button>
                </div>
            </section>
        </main>
    </div>

    <!-- RAPORLAR MODALI GERİ GELDİ -->
    <div id="modal-reports" class="modal-overlay hidden">
        <div class="card" style="width: 100%; max-width: 400px; text-align:center;">
            <i class='bx bxs-file-pdf' style="font-size: 3rem; color:#f59e0b;"></i>
            <h3>Döküman ve Raporlar</h3>
            <p style="font-size: 0.8rem; color: #94a3b8;">Günün özet raporunu PDF olarak alın.</p>
            <button class="btn" id="btn-gen-pdf" style="width: 100%; margin-top: 20px;">PDF OLUŞTUR</button>
            <button class="btn btn-ghost" style="width: 100%; margin-top: 10px;" onclick="window.closeReportsModal()">Kapat</button>
        </div>
    </div>

    <div id="modal-new-task" class="modal-overlay hidden">
        <div class="card" style="width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;">
            <h3>Yeni İş Ataması</h3>
            <div id="task-form-content"></div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn" id="btn-save-task" style="flex:1;">Kaydet</button>
                <button class="btn btn-ghost" onclick="document.getElementById('modal-new-task').classList.add('hidden')">Kapat</button>
            </div>
        </div>
    </div>

    <script>
        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            if (pageId === 'map' && window.map) {
                setTimeout(() => window.map.invalidateSize(), 300);
            }
        }
    </script>
    <script type="module">
        import { auth, db } from './firebase-app.js';
        import { protectPage } from './auth-guard-central.js';
        import { initTasks } from './tasks.js?v=210';
        import { initLocation } from './location.js?v=210';
        import { initMap } from './maps.js?v=210';
        import { initReports } from './reports.js?v=210';
        import { initLayers } from './layers.js?v=210';

        protectPage().then(({ authorized, data }) => {
            document.getElementById('loader').style.display = 'none';
            if (!authorized) return;
            window.user = auth.currentUser;
            window.userData = data;
            document.getElementById('display-name').textContent = data.name || 'Yönetici';
            document.getElementById('p-name').textContent = data.name || 'Yönetici';

            initTasks(); initMap(); initReports(); initLayers(); initLocation();
        });
    </script>
</body>
</html>
