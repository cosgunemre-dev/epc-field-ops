<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SahaBOSS — Yönetici Paneli</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sahaboss.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 0; }
        .top-bar { padding: 12px 20px; background: #1e293b; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top:0; z-index: 1100; }
        .tab-bar { background: #111827; display: flex; justify-content: space-around; padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top:52px; z-index: 1050; }
        .nav-item { text-align: center; color: #94a3b8; font-size: 0.75rem; cursor: pointer; flex:1; padding: 12px; background: none; border:none; transition: 0.3s; }
        .nav-item.active { color: #f59e0b; border-bottom: 2px solid #f59e0b; background: rgba(245,158,11,0.05); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 3px; }
        .main-content { padding: 20px; min-height: calc(100vh - 150px); }
        .page { display: none; max-width: 1200px; margin: 0 auto; }
        .page.active { display: block; }
        .card { background: #1e293b; border-radius: 14px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; color: #000; background: #f59e0b; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
        .btn-ghost { background: rgba(255,255,255,0.05); color: #fff; }
        .map-wrapper { display: flex; height: 620px; border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        #map-sidebar { width: 260px; padding: 15px; overflow-y: auto; background: #111827; border-right: 1px solid rgba(255,255,255,0.1); }
        #map-container { flex: 1; height: 100%; z-index: 1; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .hidden { display: none !important; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; background: #0f172a; border: 1px solid #334155; color: #fff; margin-bottom: 15px; font-family: inherit; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="top-bar">
            <h1 style="font-size: 1.2rem; margin: 0; font-weight: 800; color: #f59e0b;">SahaBOSS</h1>
            <div id="display-name" style="font-size: 0.8rem; color: #94a3b8;">Yönetici</div>
        </header>

        <nav class="tab-bar">
            <button class="nav-item active" onclick="showPage('dashboard', this)" data-nav="dashboard"><i class='bx bxs-dashboard'></i>Özet</button>
            <button class="nav-item" onclick="showPage('tasks', this)" data-nav="tasks"><i class='bx bx-list-ul'></i>İşler</button>
            <button class="nav-item" onclick="showPage('map', this)" data-nav="map"><i class='bx bx-map-pin'></i>Harita</button>
            <button class="nav-item" id="btn-open-reports"><i class='bx bxs-file-pdf'></i>Raporlar</button>
            <button class="nav-item" onclick="showPage('profile', this)" data-nav="profile"><i class='bx bxs-group'></i>Ekip</button>
        </nav>

        <main class="main-content">
            <section id="page-dashboard" class="page active">
                <div class="card" style="background: linear-gradient(135deg, #1e293b, #0f172a); border-left: 4px solid #f59e0b;">
                    <h2 style="margin:0;">Merhaba, <span id="welcome-name">Yöneticim</span></h2>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                    <button class="btn" style="height: 60px;" onclick="window.openNewTaskModal()"><i class='bx bx-plus-circle'></i> YENİ İŞ ATA</button>
                    <button class="btn" style="height: 60px; background: #10b981;" onclick="document.getElementById('modal-add-staff').classList.remove('hidden')"><i class='bx bx-user-plus'></i> PERSONEL EKLE</button>
                </div>
                <div id="tasks-summary-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="card" style="text-align:center;"><div id="count-pending" style="font-size:1.5rem; font-weight:800; color:#f59e0b;">0</div><div style="font-size:0.7rem;">BEKLEYEN</div></div>
                    <div class="card" style="text-align:center;"><div id="count-done" style="font-size:1.5rem; font-weight:800; color:#10b981;">0</div><div style="font-size:0.7rem;">TAMAMLANAN</div></div>
                </div>
            </section>

            <section id="page-tasks" class="page">
                <h3>Saha Görevleri</h3>
                <div id="tasks-container"></div>
            </section>

            <section id="page-map" class="page">
                <div class="map-wrapper">
                    <div id="map-sidebar">
                        <h4 style="color:#f59e0b; margin-top:0;">Katman Yönetimi</h4>
                        <input type="file" id="input-layer-file" accept=".kml,.kmz" style="font-size: 11px;">
                        <button class="btn" style="width:100%; font-size: 11px; padding:8px;" onclick="handleLayerUpload()">Projeyi Ekle</button>
                        <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:15px 0;">
                        <div id="layer-list"></div>
                    </div>
                    <div id="map-container"></div>
                </div>
            </section>

            <section id="page-profile" class="page">
                <div class="card">
                    <h2 style="margin:0;">Ekip Listesi</h2>
                    <p style="color:#94a3b8; font-size:0.8rem; margin-bottom:20px;">Ekibinizdeki mevcut personelleri buradan yönetebilirsiniz.</p>
                    <div id="team-list"></div>
                    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0;">
                    <button class="btn" style="background:#ef4444; color:#fff; width:100%;" onclick="window.location.href='login.html'">OTURUMU KAPAT</button>
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL: PERSONEL EKLE (DAHİL ET) -->
    <div id="modal-add-staff" class="modal-overlay hidden">
        <div class="card" style="width: 100%; max-width: 400px;">
            <h3 style="margin-top:0;">Personel Dahil Et</h3>
            <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom:15px;">Sisteme kayıtlı personelin e-posta adresini yazarak ekibinize ekleyebilirsiniz.</p>
            <label>PERSONEL E-POSTA ADRESİ</label>
            <input type="email" id="invite-email" placeholder="personel@epcfieldops.com">
            <div style="display:flex; gap:10px;">
                <button class="btn" id="btn-invite-staff" style="flex:2;">EKİBE KAT</button>
                <button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('modal-add-staff').classList.add('hidden')">İPTAL</button>
            </div>
        </div>
    </div>

    <div id="modal-new-task" class="modal-overlay hidden">
        <div class="card" style="width: 100%; max-width: 500px;">
            <h3>Yeni İş Ataması</h3>
            <label>İŞ BAŞLIĞI</label>
            <input type="text" id="task-title" placeholder="Görev adı">
            <label>PERSONEL SEÇ</label>
            <select id="task-assignee"><option value="">Yükleniyor...</option></select>
            <label>AÇIKLAMA</label>
            <textarea id="task-desc" rows="4"></textarea>
            <div style="display:flex; gap:10px;">
                <button class="btn" id="btn-save-task" style="flex:2;">GÖNDER</button>
                <button class="btn btn-ghost" onclick="document.getElementById('modal-new-task').classList.add('hidden')">KAPAT</button>
            </div>
        </div>
    </div>

    <script>
        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            if (el) el.classList.add('active');
            if (pageId === 'map' && window.map) setTimeout(() => window.map.invalidateSize(), 400);
        }
    </script>
    <script type="module">
        import { auth, db } from './firebase-app.js';
        import { protectPage } from './auth-guard-central.js';
        import { initTasks } from './tasks.js?v=420';
        import { initMap } from './maps.js?v=420';
        import { initReports } from './reports.js';
        import { initLayers } from './layers.js?v=420';
        import { collection, query, where, onSnapshot, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        protectPage().then(({ authorized, data }) => {
            if (!authorized) return;
            window.user = auth.currentUser;
            window.userData = data;
            document.getElementById('display-name').textContent = data.name || 'Yönetici';
            document.getElementById('welcome-name').textContent = data.name || 'Yöneticim';

            const teamList = document.getElementById('team-list');
            const assigneeSelect = document.getElementById('task-assignee');
            const q = query(collection(db, 'users'), where('managedBy', '==', window.user.uid));
            
            onSnapshot(q, (snapshot) => {
                let html = '';
                assigneeSelect.innerHTML = '<option value="">Personel Seçiniz...</option>';
                snapshot.forEach(d => {
                    const s = d.data();
                    const name = s.name || s.displayName || s.email;
                    html += `<div class="card" style="padding:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05);">
                        <div><div style="font-weight:bold; font-size:0.9rem;">${name}</div><div style="font-size:0.7rem; color:#94a3b8;">${s.email}</div></div>
                        <button onclick="window.confirmRemoval('${d.id}', '${name}')" class="btn btn-ghost" style="color:#ef4444; padding:5px 10px; font-size:0.7rem;"><i class='bx bx-user-minus'></i> SİL</button>
                    </div>`;
                    assigneeSelect.innerHTML += `<option value="${d.id}">${name}</option>`;
                });
                teamList.innerHTML = html || '<p style="color:#94a3b8; font-size:0.8rem; text-align:center;">Ekibinizde henüz kayıtlı personel yok.</p>';
            });

            // PERSONELİ E-POSTA İLE EKİBE KATMA
            document.getElementById('btn-invite-staff').onclick = async () => {
                const email = document.getElementById('invite-email').value.trim();
                if (!email) return alert("Lütfen personelin e-posta adresini girin.");
                
                try {
                    const staffQuery = query(collection(db, 'users'), where('email', '==', email));
                    const snap = await getDocs(staffQuery);
                    
                    if (snap.empty) {
                        alert("❌ HATA: Bu e-posta ile kayıtlı bir kullanıcı bulunamadı.");
                    } else {
                        const staffDoc = snap.docs[0];
                        await updateDoc(doc(db, 'users', staffDoc.id), { managedBy: window.user.uid });
                        alert(`✅ BAŞARILI: ${email} ekibinize dahil edildi.`);
                        document.getElementById('modal-add-staff').classList.add('hidden');
                        document.getElementById('invite-email').value = '';
                    }
                } catch (e) { alert("Hata: " + e.message); }
            };

            window.confirmRemoval = async (uid, name) => {
                if (confirm(`${name} ekibinizden çıkarılsın mı?`)) {
                    await updateDoc(doc(db, 'users', uid), { managedBy: "" });
                    alert("Çıkarıldı.");
                }
            };

            initTasks(); initMap(); initReports(); initLayers();
            document.getElementById('loader').style.display = 'none';
        });
    </script>
</body>
</html>
