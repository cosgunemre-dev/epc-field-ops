<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş / Kayıt - EPC Field Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #121216;
            --accent: #f59e0b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .login-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
            padding: 40px; width: 100%; max-width: 450px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; z-index: 10;
        }

        .logo { font-size: 1.8rem; font-weight: 800; margin-bottom: 30px; }
        .logo span { color: var(--accent); }

        .tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 15px; cursor: pointer; color: var(--text-dim); transition: 0.3s; font-weight: 600; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim); }
        .input-group input {
            width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 1rem;
            outline: none; transition: all 0.2s;
        }
        .input-group input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.05); }

        .btn-submit {
            width: 100%; padding: 16px; background: var(--accent); color: #000;
            border: none; border-radius: 12px; font-size: 1rem; font-weight: 800;
            cursor: pointer; transition: all 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .error-message { color: var(--error); font-size: 0.85rem; margin-top: 15px; display: none; text-align: left; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px; }

        .glow { position: absolute; width: 300px; height: 300px; background: var(--accent); filter: blur(150px); opacity: 0.1; z-index: 1; }
    </style>
</head>
<body>
    <div class="glow" style="top: 20%; left: 20%;"></div>
    <div class="glow" style="bottom: 20%; right: 20%;"></div>

    <div class="login-card">
        <div class="logo">EPC <span>FIELD OPS</span></div>
        
        <div class="tabs">
            <div class="tab active" id="tab-login" onclick="switchTab('login')">Giriş Yap</div>
            <div class="tab" id="tab-register" onclick="switchTab('register')">Kayıt Ol</div>
        </div>

        <!-- GİRİŞ FORMU -->
        <div id="form-login" class="form-section active">
            <div class="input-group">
                <label>E-posta</label>
                <input type="email" id="login-email" placeholder="ornek@firma.com" autocomplete="email">
            </div>
            <div class="input-group">
                <label>Şifre</label>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn-submit" id="btn-login-submit">Giriş Yap</button>
            <div id="login-error" class="error-message"></div>
        </div>

        <!-- KAYIT FORMU -->
        <div id="form-register" class="form-section">
            <div class="input-group">
                <label>Ad Soyad</label>
                <input type="text" id="register-name" placeholder="Müh. Emre Coşgun" autocomplete="name">
            </div>
            <div class="input-group">
                <label>E-posta</label>
                <input type="email" id="register-email" placeholder="ornek@firma.com" autocomplete="email">
            </div>
            <div class="input-group">
                <label>Şifre (En az 6 karakter)</label>
                <input type="password" id="register-password" placeholder="••••••••" autocomplete="new-password">
            </div>
            <button class="btn-submit" id="btn-register-submit">Hesap Oluştur ve 2 Gün Dene</button>
            <div id="register-error" class="error-message"></div>
        </div>
    </div>

    <!-- Firebase Script Entegrasyonu -->
    <script type="module">
        import { auth, signInWithEmailAndPassword, registerUser } from './firebase-app.js';

        // UI Tab Geçişleri (Bunu da global window içine koyalım ki HTML onclick çağırabilsin)
        window.switchTab = function(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            document.getElementById(`tab-${type}`).classList.add('active');
            document.getElementById(`form-${type}`).classList.add('active');
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('register-error').style.display = 'none';
        }

        // --- GİRİŞ MANTIĞI ---
        const btnLoginSubmit = document.getElementById('btn-login-submit');
        const errLogin = document.getElementById('login-error');

        btnLoginSubmit.addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            
            if(!email || !pass) { showError(errLogin, "Lütfen tüm alanları doldurun."); return; }
            
            btnLoginSubmit.disabled = true;
            btnLoginSubmit.innerText = "Giriş Yapılıyor...";

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                
                // Firestore'dan kullanıcının rolünü anında kontrol et
                const { db, doc, getDoc } = await import('./firebase-app.js');
                const userSnap = await getDoc(doc(db, "users", user.uid));
                const userData = userSnap.exists() ? userSnap.data() : {};

                if (userData.isFieldStaff || userData.role === 'isci') {
                    // SAHA PERSONELİ: Hiçbir onaya/aboneliğe bakmadan doğrudan portalına gönder
                    window.location.href = "worker-sahaboss.html";
                } else if (!user.emailVerified) {
                    // NORMAL KULLANICI: Onaylı değilse dışarı at
                    await auth.signOut();
                    showError(errLogin, "Güvenlik: E-postanızı henüz doğrulamadınız. Lütfen gelen kutunuzu kontrol edip onay linkini tıklayın.");
                } else {
                    // YÖNETİCİ/ABONE: Onaylıysa Dashboard'a gönder
                    window.location.href = "dashboard.html";
                }
            } catch (error) {
                console.error("Giriş Hatası:", error);
                showError(errLogin, "Giriş başarısız. E-posta veya şifre yanlış.");
            } finally {
                btnLoginSubmit.disabled = false;
                btnLoginSubmit.innerText = "Giriş Yap";
            }
        });

        // --- KAYIT MANTIĞI ---
        const btnRegSubmit = document.getElementById('btn-register-submit');
        const errReg = document.getElementById('register-error');

        btnRegSubmit.addEventListener('click', async () => {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const pass = document.getElementById('register-password').value;

            if(!name || !email || !pass) { showError(errReg, "Lütfen tüm alanları doldurun."); return; }
            if(pass.length < 6) { showError(errReg, "Şifre en az 6 karakter olmalıdır."); return; }

            btnRegSubmit.disabled = true;
            btnRegSubmit.innerText = "Hesap Kuruluyor...";

            try {
                // Bizim yazdığımız o özel fonksiyonu çağırıyoruz (Kaydol + Veritabanına Yaz + Mail Gönder)
                await registerUser(email, pass, name);
                
                // Başarılı! Doğrulanmadığı için hesabından çıkış yapıyor ve panel gösteriyoruz.
                await auth.signOut();
                
                document.getElementById('form-register').innerHTML = `
                    <div style="padding: 25px; background: rgba(16, 185, 129, 0.05); border: 1px solid #10b981; border-radius: 16px; text-align: left;">
                        <h3 style="color: #10b981; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;"><span>✅</span> Kayıt Başarılı!</h3>
                        <p style="color: #94a3b8; font-size: 0.95rem; line-height: 1.6; margin-bottom: 20px;">Sistemi kötüye kullanımlardan korumak için onay sistemi kullanıyoruz. Lütfen <b>${email}</b> adresine giderek gönderdiğimiz Onay Linkine tıklayın.</p>
                        <p style="color: #ef4444; font-size: 0.85rem; margin-bottom: 20px;">* E-posta gelmediyse lütfen SPAM (Gereksiz İşler) klasörünüzü kontrol edin.</p>
                        <button class="btn-submit" onclick="window.switchTab('login')" style="background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-top: 0;">Giriş Sayfasına Dön</button>
                    </div>
                `;

            } catch (error) {
                console.error("Kayıt Hatası:", error);
                if (error.code === 'auth/email-already-in-use') {
                    showError(errReg, "Bu e-posta adresi zaten kullanılıyor.");
                } else {
                    showError(errReg, "Kayıt sırasında bir hata oluştu: " + error.message);
                }
            } finally {
                btnRegSubmit.disabled = false;
                btnRegSubmit.innerText = "Hesap Oluştur ve 2 Gün Dene";
            }
        });

        function showError(element, message) {
            element.innerText = message;
            element.style.display = 'block';
        }
    </script>
</body>
</html>
