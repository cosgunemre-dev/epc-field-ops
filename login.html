<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - EPC Field Ops</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #121216;
            --accent: #f59e0b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .login-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
            padding: 50px; width: 100%; max-width: 450px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo { font-size: 1.8rem; font-weight: 800; margin-bottom: 40px; }
        .logo span { color: var(--accent); }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim); }
        .input-group input {
            width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 1rem;
            outline: none; transition: all 0.2s;
        }
        .input-group input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.05); }

        .btn-login {
            width: 100%; padding: 16px; background: var(--accent); color: #000;
            border: none; border-radius: 12px; font-size: 1rem; font-weight: 800;
            cursor: pointer; transition: all 0.3s; margin-top: 10px;
        }
        .btn-login:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2); }

        .footer-links { margin-top: 25px; font-size: 0.9rem; color: var(--text-dim); }
        .footer-links a { color: var(--accent); text-decoration: none; font-weight: 600; }

        .glow {
            position: absolute; width: 300px; height: 300px; background: var(--accent);
            filter: blur(150px); opacity: 0.1; z-index: -1;
        }
    </style>
</head>
<body>
    <div class="glow" style="top: 20%; left: 20%;"></div>
    <div class="glow" style="bottom: 20%; right: 20%;"></div>

    <div class="login-card">
        <div class="logo">EPC <span>FIELD OPS</span></div>
        <h2 style="margin-bottom: 30px; font-size: 1.5rem;">Hoşgeldiniz</h2>
        
        <div class="input-group">
            <label>E-posta Adresi</label>
            <input type="email" placeholder="ornek@sirket.com" value="cosgunemre@gmail.com">
        </div>
        
        <div class="input-group">
            <label>Şifre</label>
            <input type="password" placeholder="••••••••" value="123456">
        </div>

        <button class="btn-login" onclick="window.location.href='dashboard.html'">Giriş Yap</button>

        <div class="footer-links">
            Hesabınız yok mu? <a href="#">Hemen Başvurun</a>
        </div>
    </div>
</body>
</html>
